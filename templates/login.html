{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh; padding: 2rem;">
  
  <div class="card border-0 shadow-sm p-4 w-100 login-card" style="max-width: 640px; border-radius: 15px;">
    
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">Chào mừng trở lại!</h2>
      <p class="text-muted small">Đăng nhập để tiếp tục sử dụng hệ thống</p>
    </div>

    <form action="/login" method="post">
      <div class="form-floating mb-3">
        <input name="username" class="form-control form-control-lg" id="username" placeholder="Tên đăng nhập" required />
        <label for="username">Tên đăng nhập</label>
      </div>

      <div class="form-floating mb-3">
        <input name="password" type="password" class="form-control form-control-lg" id="password" placeholder="Mật khẩu" required />
        <label for="password">Mật khẩu</label>
      </div>

      <button class="btn btn-primary w-100 py-2 fw-bold" type="submit" style="border-radius: 8px;">
        Đăng nhập
      </button>
    </form>

    <div class="text-center mt-4">
      <a href="#" class="text-decoration-none small text-muted">Quên mật khẩu?</a>
    </div>

  </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

{% endblock %}
