{% extends 'base.html' %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/electric.css">
{% endblock %}
{% block content %}
<input type="hidden" id="global_csrf_token"  name="csrf_token" value="{{ request.state.csrf_token if request and request.state and request.state.csrf_token else '' }}">
<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
  <div>
    <h1 class="h4 fw-bold text-dark mb-1"><i class="fa-solid fa-bolt text-warning me-2"></i>Chỉ số điện</h1>
    <div class="text-muted small">Quản lý và chốt số điện tiêu thụ hàng tháng của các phòng</div>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-primary rounded-pill px-3 shadow-sm" data-bs-toggle="modal" data-bs-target="#createReadingModal"><i class="fa-solid fa-plus me-1"></i>Thêm chỉ số</button>
    <button class="btn btn-light border rounded-pill px-3" type="button" data-print-target=".table-responsive" data-print-title="Chi so dien"><i class="fa-solid fa-print text-muted me-1"></i>In ảnh</button>
  </div>
</div>

<div class="bg-panel p-3 mb-4 d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
  <div class="input-group" style="max-width: 400px;">
    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-magnifying-glass"></i></span>
    <input class="form-control border-start-0 bg-light" id="electricSearch" placeholder="Tìm theo phòng / tháng..." />
  </div>

  <div class="d-flex flex-wrap gap-2">
    <select class="form-select bg-light border-0 fw-semibold text-dark" id="electricSort" style="width: auto; cursor: pointer; min-width: 200px;">
      <option value="default">Sắp xếp mặc định</option>
      <option value="month_desc" selected>Tháng: Mới nhất</option>
      <option value="month_asc">Tháng: Cũ nhất</option>
      <option value="usage_desc">Đã dùng: Cao -> Thấp</option>
      <option value="usage_asc">Đã dùng: Thấp -> Cao</option>
    </select>
  </div>
</div>

<div class="bg-panel p-0 overflow-hidden mb-4">
  <div class="table-responsive m-0">
    <table class="table table-hover mb-0" id="electricTable">
      <thead>
        <tr>
          <th>Phòng</th>
          <th class="text-center">Kỳ (tháng)</th>
          <th class="text-center">Số cũ</th>
          <th class="text-center">Số mới</th>
          <th class="text-center">Đã dùng</th>
          <th class="text-center">Thao tác</th>
        </tr>
      </thead>
      <tbody id="electricTableBody" data-auto-load="true">
        <tr id="electric-loading">
          <td colspan="6" class="text-center text-muted py-4">
            <span class="spinner-border spinner-border-sm text-primary me-2" role="status" aria-hidden="true"></span>
            Đang tải dữ liệu điện năng...
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="createReadingModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold"><i class="fa-solid fa-bolt text-warning me-2"></i>Chốt số điện mới</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form action="/electric/add" method="post">
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token if request and request.state and request.state.csrf_token else '' }}">
        <div class="modal-body">
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label small fw-semibold text-muted">Phòng</label>
              <select class="form-select bg-light" name="room_id" id="roomSelect" required>
                <option value="" selected disabled>-- Chọn phòng --</option>
                {% for r in rooms %}
                  <option value="{{ r.id }}">P. {{ r.room_number }} {% if r.status == 'occupied' %}(Đang thuê){% endif %}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold text-muted">Kỳ (Tháng)</label>
              <input class="form-control bg-light" name="month" type="month" value="{{ default_month }}" required />
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label small fw-semibold text-muted">Số cũ (Hệ thống tự lấy)</label>
              <input class="form-control bg-secondary-subtle text-muted" name="old_index" id="oldIndex" placeholder="Chỉ số cũ" type="number" readonly />
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold text-primary">Số mới (Chỉ số hiện tại)</label>
              <input class="form-control border-primary shadow-sm" name="new_index" placeholder="Nhập số mới" type="number" required />
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label small fw-semibold text-muted">Đơn giá (VNĐ/kWh)</label>
            <input class="form-control bg-light" name="price_per_kwh" placeholder="VD: 3000" value="3000" type="number" required />
          </div>
        </div>
        <div class="modal-footer bg-light rounded-bottom-4">
          <button class="btn btn-light border rounded-pill px-4" data-bs-dismiss="modal" type="button">Hủy</button>
          <button class="btn btn-primary rounded-pill px-4" type="submit">Lưu chỉ số</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="editReadingModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold"><i class="fa-solid fa-pen-to-square text-primary me-2"></i>Sửa chỉ số điện</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="editReadingForm" method="post">
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token if request and request.state and request.state.csrf_token else '' }}">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small fw-semibold text-muted">Kỳ (Tháng)</label>
            <input class="form-control bg-light" id="edit_month" name="month" type="month" required>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label small fw-semibold text-muted">Số cũ</label>
              <input class="form-control bg-light" id="edit_old_index" name="old_index" type="number" required>
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold text-muted">Số mới</label>
              <input class="form-control bg-light" id="edit_new_index" name="new_index" type="number" required>
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label small fw-semibold text-muted">Đơn giá (VNĐ/kWh)</label>
            <input class="form-control bg-light" id="edit_price" name="price_per_kwh" type="number" required>
          </div>
        </div>
        <div class="modal-footer bg-light rounded-bottom-4">
          <button class="btn btn-light border rounded-pill px-4" data-bs-dismiss="modal" type="button">Hủy</button>
          <button class="btn btn-primary rounded-pill px-4" type="submit">Lưu thay đổi</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="/static/js/electric.js?v=2"></script>
{% endblock %}
